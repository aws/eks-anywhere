            type: string
          metadata:
            type: object
          spec:
            description: InClusterIPPoolSpec defines the desired state of InClusterIPPool.
            properties:
              addresses:
                items:
                  type: string
                type: array
              gateway:
                type: string
              prefix:
                type: integer
            required:
